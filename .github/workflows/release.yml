name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on semantic version tags like v0.1.0, v1.2.3, etc.

permissions:
  contents: write
  packages: read
  id-token: write  # For potential future signing with Cosign

jobs:
  # Build and test the Go module
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Verify module
        run: go mod verify

      - name: Run tests
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Build all packages
        run: go build ./...

      - name: Build all examples
        run: |
          for example in examples/*/; do
            if [ -f "$example/main.go" ]; then
              echo "Building example: $example"
              cd "$example"
              go build -o "$(basename $example)" .
              cd - > /dev/null
            fi
          done

      - name: Build evroc-login tool
        run: |
          cd cmd/evroc-login
          go build -o evroc-login .

  # Create GitHub Release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION_NO_V=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          REPO=${{ github.repository }}

          # Extract changelog for this version
          if grep -q "## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
            NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$d')
          elif grep -q "## ${VERSION}" CHANGELOG.md 2>/dev/null; then
            NOTES=$(sed -n "/## ${VERSION}/,/## /p" CHANGELOG.md | sed '$d')
          else
            NOTES="Release ${VERSION}

          See [CHANGELOG.md](https://github.com/${REPO}/blob/main/CHANGELOG.md) for details."
          fi

          # Append installation and documentation info
          cat >> release_notes.txt <<EOF
          ${NOTES}

          ## Installation

          \`\`\`bash
          go get github.com/evroc-oss/evroc-go-sdk@${VERSION}
          \`\`\`

          ## Documentation

          - [API Documentation](https://pkg.go.dev/github.com/evroc-oss/evroc-go-sdk@${VERSION})
          - [README](https://github.com/${REPO}/blob/main/README.md)
          - [Examples](https://github.com/${REPO}/tree/main/examples)
          EOF

      - name: Create release
        uses: softprops/action-gh-release@7cd44b5d1f11632e5e48f27e9f2e395c54e42c893 # v2.2.0
        with:
          body_path: release_notes.txt
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go for pkg.go.dev
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.24'

      - name: Trigger pkg.go.dev indexing
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          echo "Triggering pkg.go.dev indexing for ${VERSION}..."

          # Wait a moment for the tag to propagate
          sleep 5

          # Request the module info to trigger indexing
          curl -s "https://proxy.golang.org/github.com/evroc-oss/evroc-go-sdk/@v/${VERSION}.info" || echo "Proxy request completed"
          curl -s "https://sum.golang.org/lookup/github.com/evroc-oss/evroc-go-sdk@${VERSION}" || echo "Sum lookup completed"

          echo "Package should appear on pkg.go.dev within a few minutes:"
          echo "https://pkg.go.dev/github.com/evroc-oss/evroc-go-sdk@${VERSION}"
