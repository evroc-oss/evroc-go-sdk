name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on semantic version tags like v0.1.0, v1.2.3, etc.

permissions:
  contents: write
  packages: read
  id-token: write  # Required for Cosign keyless signing via Sigstore

jobs:
  # Build and test the Go module
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Verify module
        run: go mod verify

      - name: Run tests
        run: |
          PACKAGES=$(go list ./... | grep -v '/examples/' | grep -v '/internal/codegen' | grep -v '/cmd/')
          go test -v -race -coverprofile=coverage.out $PACKAGES
          go tool cover -func=coverage.out

      - name: Build all packages
        run: go build ./...

      - name: Build all examples
        run: |
          for example in examples/*/; do
            if [ -f "$example/main.go" ]; then
              if [ "$(basename "$example")" = "metrics" ]; then
                echo "Skipping example (requires Go 1.25.6): $example"
                continue
              fi
              echo "Building example: $example"
              cd "$example"
              go build -o "$(basename $example)" .
              cd - > /dev/null
            fi
          done

      - name: Build login tool
        run: |
          cd cmd/login
          go build -o login .

  # Create GitHub Release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION_NO_V=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          REPO=${{ github.repository }}

          # Extract changelog for this version
          if grep -q "## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
            NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$d')
          elif grep -q "## ${VERSION}" CHANGELOG.md 2>/dev/null; then
            NOTES=$(sed -n "/## ${VERSION}/,/## /p" CHANGELOG.md | sed '$d')
          else
            NOTES="Release ${VERSION}

          See [CHANGELOG.md](https://github.com/${REPO}/blob/main/CHANGELOG.md) for details."
          fi

          # Append installation and documentation info
          cat >> release_notes.txt <<EOF
          ${NOTES}

          ## Installation

          \`\`\`bash
          go get github.com/evroc-oss/evroc-go-sdk@${VERSION}
          \`\`\`

          ## Documentation

          - [API Documentation](https://pkg.go.dev/github.com/evroc-oss/evroc-go-sdk@${VERSION})
          - [README](https://github.com/${REPO}/blob/main/README.md)
          - [Examples](https://github.com/${REPO}/tree/main/examples)
          EOF

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false
          upload-artifact: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign SBOM with Cosign
        run: |
          cosign sign-blob --yes \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.pem \
            sbom.spdx.json

      - name: Create release with SBOM artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file release_notes.txt \
            sbom.spdx.json \
            sbom.spdx.json.sig \
            sbom.spdx.json.pem

      - name: Trigger pkg.go.dev indexing
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          echo "Triggering pkg.go.dev indexing for ${VERSION}..."

          # Wait for the tag to propagate to GitHub
          sleep 10

          # Request the module info to trigger indexing
          curl -s "https://proxy.golang.org/github.com/evroc-oss/evroc-go-sdk/@v/${VERSION}.info" || echo "Proxy request completed"
          curl -s "https://sum.golang.org/lookup/github.com/evroc-oss/evroc-go-sdk@${VERSION}" || echo "Sum lookup completed"

          echo "✓ Indexing triggered. Package should appear on pkg.go.dev within a few minutes:"
          echo "  https://pkg.go.dev/github.com/evroc-oss/evroc-go-sdk@${VERSION}"
