name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  # Check that go.mod is tidy
  go-mod-tidy:
    name: Go Mod Tidy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'

      - name: Check go.mod is tidy
        run: |
          go version
          go mod tidy
          git diff --exit-code go.mod go.sum
          go mod verify

  # Lint Go code
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          args: --timeout=5m

  # Run tests
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'

      - name: Run tests
        run: |
          PACKAGES=$(go list ./... | grep -v '/examples/' | grep -v '/internal/codegen' | grep -v '/cmd/')
          go test -v -race -coverprofile=coverage.out $PACKAGES

      - name: Coverage report
        run: go tool cover -func=coverage.out

  # Build all packages
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'

      - name: Build all packages
        run: go build ./...

  # Build OAuth login tool
  build-login-tool:
    name: Build Login Tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'

      - name: Build login
        run: |
          cd cmd/login
          go build -o login .

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: login
          path: cmd/login/login
          retention-days: 7

  # Build all examples
  build-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - authentication
          - compute
          - context-and-retries
          - create-vm
          - hotswap-disk
          - iam
          - k3s-cluster
          - labels
          - networking
          - storage
          - storage-public-urls
          - think-api-key
          - think-dedicated-models
          - vm-backup-to-storage
          - web-server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'

      - name: Build example
        run: |
          cd examples/${{ matrix.example }}
          go build -o example-${{ matrix.example }} .

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: example-${{ matrix.example }}
          path: examples/${{ matrix.example }}/example-${{ matrix.example }}
          retention-days: 7
